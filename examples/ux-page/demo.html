<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title data-i18n="title">Demo page</title>
<style>
  :root { --ink: #12181f; --paper: #f4f2ec; }
  .card { border: 1px solid #ccc; padding: 1rem; }
  .card:hover { transform: translateY(-2px); }
  .pulse { animation: pulse 1.4s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .6; } }
  @media (prefers-reduced-motion: reduce) {
    .pulse { animation: none; }
  }
</style>
</head>
<body>
  <h1 data-i18n="title">Demo page</h1>
  <p data-i18n="lead">A minimal, self-contained example for the UX/accessibility gate.</p>
  <div id="status" class="card pulse">OK</div>
  <button id="toggle-btn" type="button" data-i18n="toggle">Toggle</button>

  <script type="application/json" id="i18n-data">
  {
    "en": {
      "title": "Demo page",
      "lead": "A minimal, self-contained example for the UX/accessibility gate.",
      "toggle": "Toggle"
    },
    "es": {
      "title": "Pagina de ejemplo",
      "lead": "Un ejemplo minimo y autocontenido para el gate de UX/accesibilidad.",
      "toggle": "Alternar"
    }
  }
  </script>

  <script type="application/json" id="ux-contrast-pairs">
  [
    { "scope": "root", "text": "#12181f", "bg": "#f4f2ec" },
    { "scope": "dark", "text": "#e8e6dc", "bg": "#1b2430" },
    { "scope": "light", "text": "#1e2a2a", "bg": "#edefe7" }
  ]
  </script>

  <script>
    document.getElementById("toggle-btn").addEventListener("click", function () {
      var el = document.getElementById("status");
      el.textContent = el.textContent === "OK" ? "..." : "OK";
    });
    document.querySelector("#status");
  </script>
</body>
</html>
